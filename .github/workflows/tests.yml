name: Backend tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run unittest
        run: cd backend && PYTHONPATH=. python -m unittest discover -s tests -p "test_*.py" -v
